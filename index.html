<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thực hành STEM - Lớp 3</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f4f8; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }
        h2 { color: #2c3e50; margin-bottom: 20px; }
        input { width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #ddd; border-radius: 12px; box-sizing: border-box; font-size: 16px; }
        .strength-meter { height: 10px; background: #eee; border-radius: 5px; margin: 10px 0; overflow: hidden; }
        .bar { height: 100%; width: 0%; transition: 0.4s; }
        button { background: #3498db; color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        button:active { transform: scale(0.98); }
        .footer { margin-top: 15px; font-size: 12px; color: #7f8c8d; }
    </style>
</head>
<body>

<div class="container">
    <h2>🚀 Gửi Thư Mục</h2>
    <input type="text" id="hsName" placeholder="Tên của em (VD: Minh Anh)">
    <input type="password" id="hsPass" placeholder="Tạo mật khẩu" oninput="checkPass(this.value)">
    
    <div class="strength-meter"><div id="bar" class="bar"></div></div>
    <div id="statusText" style="font-size: 12px; font-weight: bold; margin-bottom: 10px;">Chưa nhập mật khẩu</div>

    <input type="text" id="folderName" placeholder="Tên thư mục (VD: Kho báu)">
    <button onclick="sendData()">Gửi cho Thầy/Cô</button>
    <div class="footer">STEM Tin học - An toàn kỹ thuật số</div>
</div>

<script>
 // --- COPY VÀ THAY THẾ ĐOẠN NÀY ---
  const firebaseConfig = {
    apiKey: "AIzaSyC9Dk-R8Nmkhkv5lX48fNfXmivo9GEosfU",
    authDomain: "cdsl3b13.firebaseapp.com",
    // Link này mình lấy từ ảnh Realtime Database bạn vừa gửi xong:
    databaseURL: "https://cdsl3b13-default-rtdb.asia-southeast1.firebasedatabase.app", 
    projectId: "cdsl3b13",
    storageBucket: "cdsl3b13.firebasestorage.app",
    messagingSenderId: "58108396354",
    appId: "1:58108396354:web:604223470fbaa19b8cfedb",
    measurementId: "G-EPY1HS9HWP"
  };
  // --------------------------------

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function checkPass(p) {
        const b = document.getElementById('bar');
        const t = document.getElementById('statusText');
        if (p.length === 0) { b.style.width = "0%"; t.innerText = "Chưa nhập mật khẩu"; t.style.color = "#aaa"; }
        else if (p.length < 6) { b.style.width = "30%"; b.style.backgroundColor = "#ff4757"; t.innerText = "Yếu - Đỏ"; t.style.color = "#ff4757"; }
        else if (p.length < 10) { b.style.width = "60%"; b.style.backgroundColor = "#ffa502"; t.innerText = "Trung bình - Vàng"; t.style.color = "#ffa502"; }
        else { b.style.width = "100%"; b.style.backgroundColor = "#2ed573"; t.innerText = "Mạnh - Xanh"; t.style.color = "#2ed573"; }
    }

    function sendData() {
        const name = document.getElementById('hsName').value;
        const folder = document.getElementById('folderName').value;
        const pass = document.getElementById('hsPass').value;

        if(!name || !folder || !pass) {
            alert("Em hãy điền đủ thông tin nhé!");
            return;
        }

        db.ref('class_folders').push({
            student: name,
            folder: folder,
            time: new Date().toLocaleTimeString()
        }).then(() => {
            alert("Tuyệt vời! Thư mục của " + name + " đã xuất hiện trên bảng rồi!");
            document.getElementById('folderName').value = "";
            document.getElementById('hsPass').value = "";
            checkPass("");
        }).catch((error) => {
            alert("Lỗi rồi: " + error.message);
        });
    }
</script>
</body>
</html>
